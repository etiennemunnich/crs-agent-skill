# Custom Rule: Path Traversal Detection for /api/images/ Endpoint
# Rule ID range: 100000–199999 (custom range)
# Status: ACTIVE
# Purpose: Blocks path traversal attempts on the /api/images/ endpoint
# Detects: Both unencoded (../) and URL-encoded variants (%2e%2e%2f, %252e%252e%252f)
#
# Attack vectors blocked:
# - GET /api/images/../../etc/passwd (unencoded)
# - GET /api/images/%2e%2e%2fconfig.yml (single-encoded)
# - GET /api/images/%252e%252e%252f... (double-encoded)
#
# Legitimate traffic allowed:
# - GET /api/images/product-123.jpg
# - GET /api/images/abc-def_456.png

# Phase 1: Detect unencoded path traversal on /api/images/
# Matches: ../, ..\ and their variants
SecRule REQUEST_URI "@rx ^/api/images/.*(?:\.\./|\.\.\\)" \
    "id:100100,\
    phase:2,\
    msg:'Path Traversal: Unencoded directory traversal sequence detected in /api/images/ endpoint',\
    tag:'application-attack',\
    tag:'attack-lfi',\
    tag:'paranoia-level/1',\
    tag:'custom-path-traversal',\
    severity:'CRITICAL',\
    deny,\
    status:403,\
    log"

# Phase 2: Detect single URL-encoded path traversal (%2e%2e%2f)
# %2e = dot, %2f = forward slash
SecRule REQUEST_URI "@rx ^/api/images/.*%2e%2e%2f" \
    "id:100101,\
    phase:2,\
    t:none,\
    msg:'Path Traversal: Single URL-encoded directory traversal (%2e%2e%2f) detected in /api/images/ endpoint',\
    tag:'application-attack',\
    tag:'attack-lfi',\
    tag:'paranoia-level/1',\
    tag:'custom-path-traversal',\
    severity:'CRITICAL',\
    deny,\
    status:403,\
    log"

# Phase 3: Detect single URL-encoded backslash path traversal (%2e%2e%5c)
# %5c = backslash
SecRule REQUEST_URI "@rx ^/api/images/.*%2e%2e%5c" \
    "id:100102,\
    phase:2,\
    t:none,\
    msg:'Path Traversal: Single URL-encoded backslash traversal (%2e%2e%5c) detected in /api/images/ endpoint',\
    tag:'application-attack',\
    tag:'attack-lfi',\
    tag:'paranoia-level/1',\
    tag:'custom-path-traversal',\
    severity:'CRITICAL',\
    deny,\
    status:403,\
    log"

# Phase 4: Detect double URL-encoded path traversal (%252e%252e%252f)
# %25 = percent sign, so %252e = encoded %2e = dot
SecRule REQUEST_URI "@rx ^/api/images/.*%252e%252e%252f" \
    "id:100103,\
    phase:2,\
    t:none,\
    msg:'Path Traversal: Double URL-encoded directory traversal (%252e%252e%252f) detected in /api/images/ endpoint',\
    tag:'application-attack',\
    tag:'attack-lfi',\
    tag:'paranoia-level/1',\
    tag:'custom-path-traversal',\
    severity:'CRITICAL',\
    deny,\
    status:403,\
    log"

# Phase 5: Detect double URL-encoded backslash traversal (%252e%252e%255c)
SecRule REQUEST_URI "@rx ^/api/images/.*%252e%252e%255c" \
    "id:100104,\
    phase:2,\
    t:none,\
    msg:'Path Traversal: Double URL-encoded backslash traversal (%252e%252e%255c) detected in /api/images/ endpoint',\
    tag:'application-attack',\
    tag:'attack-lfi',\
    tag:'paranoia-level/1',\
    tag:'custom-path-traversal',\
    severity:'CRITICAL',\
    deny,\
    status:403,\
    log"
