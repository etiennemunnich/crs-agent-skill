# ModSecurity Rules for Payment API (payment-api.yaml)
# Generated by explicit invocation: python scripts/openapi_to_rules.py evals/files/payment-api.yaml
# Positive security policy: allow only /api/payments and /api/payments/{id}
# Enforce Content-Type and Authorization requirements

# === Phase 1: Request Line Inspection ===

# Rule 901000: Block all requests to paths outside the payment API allowlist
# Allowed: /api/payments (POST only), /api/payments/{id} (GET, DELETE only)
SecRule REQUEST_URI "!@rx ^/api/payments(/[0-9]+)?$" \
  "id:901000,\
  phase:1,\
  status:403,\
  msg:'Path not in allowlist - only /api/payments and /api/payments/{id} are allowed',\
  log,\
  tag:'payment-api',\
  tag:'path-restriction',\
  comment:'Enforce positive allowlist for payment API paths'"

# === Phase 2: Content Validation ===

# Rule 901010: POST /api/payments requires Content-Type: application/json
SecRule REQUEST_METHOD "@streq POST" \
  "chain,\
  id:901010,\
  phase:2,\
  log,\
  tag:'payment-api',\
  tag:'content-type',\
  comment:'Require Content-Type: application/json for POST /api/payments'"

SecRule REQUEST_URI "@streq /api/payments" \
  "chain,\
  t:none"

SecRule CONTENT_TYPE "!@rx ^application/json" \
  "msg:'POST /api/payments requires Content-Type: application/json',\
  status:400"

# Rule 901020: POST /api/payments requires Authorization header with Bearer token
SecRule REQUEST_METHOD "@streq POST" \
  "chain,\
  id:901020,\
  phase:2,\
  log,\
  tag:'payment-api',\
  tag:'auth-required',\
  comment:'Require Authorization Bearer token for POST /api/payments'"

SecRule REQUEST_URI "@streq /api/payments" \
  "chain"

SecRule REQUEST_HEADERS:Authorization "@rx ^Bearer " \
  "msg:'POST /api/payments requires Authorization header with Bearer token',\
  status:401,\
  pass"

SecRule REQUEST_HEADERS:Authorization "!@rx ^Bearer " \
  "msg:'POST /api/payments requires Authorization header with Bearer token',\
  status:401"

# Rule 901030: GET /api/payments/{id} requires Authorization header with Bearer token
SecRule REQUEST_METHOD "@streq GET" \
  "chain,\
  id:901030,\
  phase:2,\
  log,\
  tag:'payment-api',\
  tag:'auth-required',\
  comment:'Require Authorization Bearer token for GET /api/payments/{id}'"

SecRule REQUEST_URI "@rx ^/api/payments/[0-9]+$" \
  "chain"

SecRule REQUEST_HEADERS:Authorization "@rx ^Bearer " \
  "msg:'GET /api/payments/{id} requires Authorization header',\
  status:401,\
  pass"

SecRule REQUEST_HEADERS:Authorization "!@rx ^Bearer " \
  "msg:'GET /api/payments/{id} requires Authorization header',\
  status:401"

# Rule 901040: DELETE /api/payments/{id} requires Authorization header with Bearer token
SecRule REQUEST_METHOD "@streq DELETE" \
  "chain,\
  id:901040,\
  phase:2,\
  log,\
  tag:'payment-api',\
  tag:'auth-required',\
  comment:'Require Authorization Bearer token for DELETE /api/payments/{id}'"

SecRule REQUEST_URI "@rx ^/api/payments/[0-9]+$" \
  "chain"

SecRule REQUEST_HEADERS:Authorization "@rx ^Bearer " \
  "msg:'DELETE /api/payments/{id} requires Authorization header',\
  status:401,\
  pass"

SecRule REQUEST_HEADERS:Authorization "!@rx ^Bearer " \
  "msg:'DELETE /api/payments/{id} requires Authorization header',\
  status:401"

