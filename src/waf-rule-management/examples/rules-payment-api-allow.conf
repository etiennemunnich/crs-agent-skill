# ModSecurity Rules for Payment API - Positive Security (Allowlist)
# Generated from payment-api.yaml OpenAPI specification
# Rules enforce: allowed paths, required headers, content-type validation

# === Rule 900000: Initialize payment-api policy ===
SecRule TX:payment_api_enabled "@rx ^" \
  "id:900000,\
  phase:1,\
  nolog,\
  pass,\
  t:none,\
  setvar:tx.payment_api_enabled=1,\
  setvar:tx.allowed_paths='^/api/payments(/[0-9]+)?$',\
  setvar:tx.post_requires_content_type=1,\
  setvar:tx.auth_required_methods='POST|DELETE',\
  ver:'1.0.0',\
  comment:'Initialize payment API allowlist policy'"

# === Rule 900010: Path enforcement - reject paths outside /api/payments* ===
SecRule REQUEST_URI "!@rx /api/payments(/[0-9]+)?$" \
  "id:900010,\
  phase:1,\
  status:403,\
  log,\
  msg:'Path not in allowlist - Payment API policy rejects this request',\
  comment:'Enforce only /api/payments and /api/payments/{id} are allowed',\
  tag:'payment-api-policy',\
  tag:'path-restriction'"

# === Rule 900020: POST /api/payments requires Content-Type: application/json ===
SecRule REQUEST_METHOD "@streq POST" \
  "chain,\
  id:900020,\
  phase:2,\
  log,\
  comment:'POST /api/payments must have Content-Type: application/json'"

SecRule REQUEST_URI "@streq /api/payments" \
  "chain"

SecRule CONTENT_TYPE "!@rx ^application/json" \
  "status:400,\
  msg:'POST /api/payments requires Content-Type: application/json',\
  tag:'payment-api-policy',\
  tag:'content-type-validation'"

# === Rule 900030: POST /api/payments requires Authorization header ===
SecRule REQUEST_METHOD "@streq POST" \
  "chain,\
  id:900030,\
  phase:2,\
  log,\
  comment:'POST /api/payments requires Authorization header'"

SecRule REQUEST_URI "@streq /api/payments" \
  "chain"

SecRule REQUEST_HEADERS:Authorization "@rx ^Bearer " \
  "phase:2,\
  nolog,\
  pass"

SecRule REQUEST_HEADERS:Authorization "!@rx ^Bearer " \
  "status:401,\
  msg:'Authorization header required for POST /api/payments',\
  tag:'payment-api-policy',\
  tag:'auth-required'"

# === Rule 900040: DELETE /api/payments/{id} requires Authorization header ===
SecRule REQUEST_METHOD "@streq DELETE" \
  "chain,\
  id:900040,\
  phase:2,\
  log,\
  comment:'DELETE /api/payments/{id} requires Authorization header'"

SecRule REQUEST_URI "@rx /api/payments/[0-9]+$" \
  "chain"

SecRule REQUEST_HEADERS:Authorization "@rx ^Bearer " \
  "phase:2,\
  nolog,\
  pass"

SecRule REQUEST_HEADERS:Authorization "!@rx ^Bearer " \
  "status:401,\
  msg:'Authorization header required for DELETE /api/payments/{id}',\
  tag:'payment-api-policy',\
  tag:'auth-required'"

# === Rule 900050: GET /api/payments/{id} requires Authorization header ===
SecRule REQUEST_METHOD "@streq GET" \
  "chain,\
  id:900050,\
  phase:2,\
  log,\
  comment:'GET /api/payments/{id} requires Authorization header'"

SecRule REQUEST_URI "@rx /api/payments/[0-9]+$" \
  "chain"

SecRule REQUEST_HEADERS:Authorization "@rx ^Bearer " \
  "phase:2,\
  nolog,\
  pass"

SecRule REQUEST_HEADERS:Authorization "!@rx ^Bearer " \
  "status:401,\
  msg:'Authorization header required for GET /api/payments/{id}',\
  tag:'payment-api-policy',\
  tag:'auth-required'"

# === Rule 900060: Reject non-allowed HTTP methods ===
SecRule REQUEST_METHOD "!@rx ^(GET|POST|DELETE)$" \
  "id:900060,\
  phase:2,\
  status:405,\
  log,\
  msg:'Method not allowed for payment API endpoint',\
  tag:'payment-api-policy',\
  tag:'method-restriction'"

# === Rule 900070: Validate payment ID format - must be positive integer ===
SecRule REQUEST_URI "@rx /api/payments/([0-9]+)$" \
  "id:900070,\
  phase:2,\
  nolog,\
  setvar:tx.payment_id=%{matched_var},\
  comment:'Extract and validate payment ID format'"

SecRule TX:payment_id "!@rx ^[1-9][0-9]*$" \
  "id:900071,\
  phase:2,\
  status:400,\
  log,\
  msg:'Invalid payment ID format - must be positive integer',\
  tag:'payment-api-policy',\
  tag:'input-validation'"

