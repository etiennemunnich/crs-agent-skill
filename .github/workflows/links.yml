name: Link Checker

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
  pull_request:
    branches: [main]
    paths:
      - "**/*.md"
  schedule:
    # Weekly on Monday at 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-links:
    name: Check Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --cache
            --max-cache-age 1d
            --exclude-path research
            --exclude-path incidents
            --exclude 'sandbox.coreruleset.org'
            --exclude 'localhost'
            --exclude '127.0.0.1'
            --exclude 'github.com/etiennemunnich/crs-agent-skill/compare/'
            --exclude 'github.com/etiennemunnich/crs-agent-skill/releases/tag/'
            --exclude 'pcre.org'
            --accept 200,403
            --timeout 30
            --max-retries 3
            '**/*.md'
          fail: true
