name: Stale Issues and PRs

on:
  schedule:
    # Run daily at 01:00 UTC
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Manage Stale Issues and PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            recent activity. It will be closed in 28 days if no further activity occurs.
            If this is still relevant, please comment or remove the stale label.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has not had
            recent activity. It will be closed in 28 days if no further activity occurs.
          close-issue-message: >
            This issue was closed because it has been stale for 28 days with no activity.
            Feel free to reopen if still relevant.
          days-before-stale: 60
          days-before-close: 28
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,security,help wanted
          exempt-pr-labels: pinned,security
