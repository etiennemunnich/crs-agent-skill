name: Skill Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  skill-validate:
    name: Agent Skill Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install skills-ref
        run: pip install "git+https://github.com/agentskills/agentskills.git#subdirectory=skills-ref"

      - name: Validate skill
        run: skills-ref validate src/waf-rule-management

      - name: Read skill properties
        run: skills-ref read-properties src/waf-rule-management
